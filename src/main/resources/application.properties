spring.application.name=FindIt
server.servlet.context-path=/find-it

server.port=9090

spring.devtools.restart.enabled=true
spring.devtools.restart.exclude=static/**,public/**,resources/**,META-INF/**,templates/**
spring.devtools.livereload.enabled=true

# Database connection URL
spring.datasource.url=jdbc:mysql://localhost:3306/find_it?allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC

# MySQL DB username and password
spring.datasource.username=root
spring.datasource.password=nipun

# Driver class name (optional in newer Spring Boot versions)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# No schema.sql/data.sql: only entity classes create/update tables.
spring.sql.init.mode=never

# Hibernate: create/update database tables from your entity classes.
# update = create missing tables, add new columns; does not drop (safe).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

jwt.secret=aP28vn3XrLm6vNlB9TpN4GtLwqzjUEKpJm3OyNxsJ48=
jwt.expiration=43200000

username.policy.regex=^[a-zA-Z0-9]{4,20}$
password.policy.regex=^(?=.*[A-Za-z])(?=.*\\d)[A-Za-z\\d]{6,12}$
phone.number.validation.regex=^(?:\\+94|0)?7\\d{8}$
email.validation.regex=^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$

# Firebase FCM: service account JSON in classpath (src/main/resources)
firebase.service-account-resource=find-it-8283f-firebase-adminsdk-fbsvc-44f6d583fc.json

# Image upload: base directory under project (images folder with subfolders: profile, items, receipt)
findit.upload.base-path=./images
findit.upload.allowed-types=profile,items,receipt,discount